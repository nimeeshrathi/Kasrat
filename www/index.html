<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F2EEE6" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#15140F" media="(prefers-color-scheme: dark)">
<title>Kasrat</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="stylesheet" href="css/fonts.css">
<link rel="stylesheet" href="css/styles.css">
</head>
<body data-theme="dark">

<!-- ── SVG ICON SPRITE ── -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
<symbol id="ic-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9.5"/><path d="M9.5 21v-6h5v6"/></symbol>
<symbol id="ic-bell" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9a6 6 0 1 1 12 0c0 5 2 6 2 6H4s2-1 2-6"/><path d="M10 20a2 2 0 0 0 4 0"/></symbol>
<symbol id="ic-dumbbell" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9v6M7 7v10M17 7v10M20 9v6M7 12h10"/></symbol>
<symbol id="ic-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7.5V12l3 2"/></symbol>
<symbol id="ic-chart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5M4 19h16M7 15l4-5 3 3 4-6"/></symbol>
<symbol id="ic-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5 21a7 7 0 0 1 14 0"/></symbol>
<symbol id="ic-flame" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c1 3-1 4-2.5 6S7 12 8 14c-2-.5-3-2-3-2 0 4 3 8 7 8s7-3 7-7c0-3-2-5-3.5-6.5C12 5 13 4 12 2Z"/></symbol>
<symbol id="ic-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></symbol>
<symbol id="ic-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></symbol>
<symbol id="ic-back" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></symbol>
<symbol id="ic-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7"/></symbol>
<symbol id="ic-pause" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1.4"/><rect x="14" y="5" width="4" height="14" rx="1.4"/></symbol>
<symbol id="ic-skip" viewBox="0 0 24 24" fill="currentColor"><path d="M5 5l9 7-9 7V5Z"/><rect x="16" y="5" width="3" height="14" rx="1.2"/></symbol>
<symbol id="ic-vibe" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="3" width="8" height="18" rx="2"/><path d="M3 9v6M21 9v6"/></symbol>
<symbol id="ic-dots" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></symbol>
<symbol id="ic-swap" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h13l-3-3M20 16H7l3 3"/></symbol>
<symbol id="ic-share" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="12" r="2.5"/><circle cx="18" cy="6" r="2.5"/><circle cx="18" cy="18" r="2.5"/><path d="M8.2 11l7.6-4M8.2 13l7.6 4"/></symbol>
<symbol id="ic-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v11M7.5 11l4.5 4 4.5-4M5 20h14"/></symbol>
<symbol id="ic-bolt" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z"/></symbol>
<symbol id="ic-grip" viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.6"/><circle cx="15" cy="6" r="1.6"/><circle cx="9" cy="12" r="1.6"/><circle cx="15" cy="12" r="1.6"/><circle cx="9" cy="18" r="1.6"/><circle cx="15" cy="18" r="1.6"/></symbol>
<symbol id="ic-trophy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4h10v5a5 5 0 0 1-10 0V4Z"/><path d="M7 5H4v2a3 3 0 0 0 3 3M17 5h3v2a3 3 0 0 1-3 3M10 18h4M9 21h6"/></symbol>
<symbol id="ic-cal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M8 3v4M16 3v4"/></symbol>
<symbol id="ic-rest" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18h18M5 18v-4a7 7 0 0 1 14 0v4M9 7l1-3M14 7l1-3"/></symbol>
<symbol id="ic-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></symbol>
</defs></svg>

<!-- ── APP ROOT ── -->
<div id="app">

  <!-- TUTORIAL / WALKTHROUGH (first run, no tab bar) -->
  <section id="screen-tutorial" class="screen no-tabs">
    <!-- rendered by JS -->
  </section>

  <!-- ONBOARDING (special: no tab bar) -->
  <section id="screen-onboarding" class="screen no-tabs slide-up">
    <!-- rendered by JS -->
  </section>

  <!-- HOME TAB -->
  <section id="screen-home" class="screen">
    <!-- rendered by JS -->
  </section>

  <!-- TRAIN TAB -->
  <section id="screen-train" class="screen">
    <!-- rendered by JS -->
  </section>

  <!-- HISTORY TAB -->
  <section id="screen-history" class="screen">
    <!-- rendered by JS -->
  </section>

  <!-- STATS TAB -->
  <section id="screen-stats" class="screen">
    <!-- rendered by JS -->
  </section>

  <!-- PROFILE TAB -->
  <section id="screen-profile" class="screen">
    <!-- rendered by JS -->
  </section>

  <!-- PUSH SCREENS -->
  <section id="screen-routines" class="screen"><!-- rendered by JS --></section>
  <section id="screen-routine-editor" class="screen"><!-- rendered by JS --></section>
  <section id="screen-library" class="screen"><!-- rendered by JS --></section>
  <section id="screen-badges" class="screen"><!-- rendered by JS --></section>

  <!-- WORKOUT LOGGER (full-screen overlay, no tab bar) -->
  <section id="screen-workout-logger" class="screen no-tabs" style="z-index:210;bottom:0">
    <!-- rendered by JS -->
  </section>

  <!-- SESSION SUMMARY (full-screen overlay) -->
  <section id="screen-session-summary" class="screen no-tabs" style="z-index:220;bottom:0">
    <!-- rendered by JS -->
  </section>

  <!-- REST TIMER OVERLAY -->
  <div id="rest-timer-screen" style="display:none;position:absolute;inset:0;bottom:0;z-index:240;flex-direction:column">
    <!-- rendered dynamically -->
  </div>

  <!-- TAB BAR -->
  <nav id="tab-bar">
    <button class="tab" data-tab="home"><svg><use href="#ic-home"/></svg><span>Home</span></button>
    <button class="tab" data-tab="train"><svg><use href="#ic-dumbbell"/></svg><span>Train</span></button>
    <button class="tab" data-tab="history"><svg><use href="#ic-clock"/></svg><span>History</span></button>
    <button class="tab" data-tab="stats"><svg><use href="#ic-chart"/></svg><span>Stats</span></button>
    <button class="tab" data-tab="profile"><svg><use href="#ic-user"/></svg><span>You</span></button>
  </nav>

  <!-- MODAL OVERLAY -->
  <div id="modal-overlay" style="display:none;position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:flex-end;justify-content:center">
    <div id="modal-box" style="background:var(--bg);border-radius:24px 24px 0 0;padding:20px 18px 32px;width:100%;max-width:430px;max-height:80vh;overflow-y:auto">
      <!-- rendered dynamically -->
    </div>
  </div>

</div>

<script src="js/storage.js"></script>
<script src="js/app.js"></script>
</body>
</html>
